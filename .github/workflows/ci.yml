name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install project dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Format check (ruff)
        run: uv run ruff format --check backend/ dataset/

      - name: Lint (ruff)
        run: uv run ruff check backend/ dataset/

      - name: Type check (mypy)
        run: uv run mypy backend/app/

      - name: Security scan (bandit)
        run: uv run bandit -r backend/app/ -q

      - name: Dependency audit (pip-audit)
        # CVE-2026-3219 affects pip itself with no fix version available upstream;
        # ignored until a patched pip release is published.
        run: uv run pip-audit --ignore-vuln CVE-2026-3219

      - name: Tests with coverage
        run: uv run pytest backend/tests/ -v --tb=short --cov=backend/app --cov-fail-under=80

      - name: Test dataset scripts
        run: uv run pytest dataset/tests/ -v --tb=short

      - name: Secrets scan
        run: uv run detect-secrets scan

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Tests
        run: npm run test
