name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install PyTorch CPU
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install ".[dev,dataset,eval]"
          pip install "filelock>=3.20.3"

      - name: Format check (black)
        run: black --check backend/app/ backend/tests/

      - name: Import sort check (isort)
        run: isort --check backend/app/ backend/tests/

      - name: Lint (ruff)
        run: ruff check backend/app/ backend/tests/

      - name: Type check (mypy)
        run: mypy backend/app/

      - name: Security scan (bandit)
        run: bandit -r backend/app/ -x backend/app/_archive/ -q

      - name: Dependency audit (pip-audit)
        # CVE-2026-3219 affects pip itself with no fix version available upstream;
        # ignored until a patched pip release is published.
        run: pip-audit --ignore-vuln CVE-2026-3219

      - name: Tests with coverage
        run: pytest backend/tests/ -v --tb=short --cov=backend/app --cov-fail-under=80

      - name: Test dataset scripts
        run: pytest dataset/tests/ -v --tb=short

      - name: Lint dataset scripts
        run: |
          black --check dataset/
          isort --check dataset/
          ruff check dataset/

      - name: Secrets scan
        run: detect-secrets scan

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Tests
        run: npm run test
