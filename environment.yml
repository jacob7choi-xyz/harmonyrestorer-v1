# HarmonyRestorer Conda Environment
# 
# This file only manages conda-specific dependencies (PyTorch on Apple Silicon).
# All other dependencies are defined in pyproject.toml.
#
#
# Make sure to first run: 
#   conda config --set channel_priority flexible
#
# Setup:
#   conda env create -f environment.yml
#   conda activate harmonyrestorer-v1
#
# The -e .[dev] installs the package in editable mode with dev dependencies.

name: harmonyrestorer-v1

channels:
  - pytorch
  - conda-forge

dependencies:
  # Python version
  - python=3.11
  
  # PyTorch ecosystem (conda-managed for Apple Silicon / CUDA compatibility)
  - pytorch=2.10.0
  - torchaudio=2.10.0
  # - torchvision=0.20.0  # uncomment if needed
  
  # pip for installing everything else
  - pip
  
  # Install project and all dependencies from pyproject.toml
  - pip:
      - -e .[dev]